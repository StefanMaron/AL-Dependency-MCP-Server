version: '3.8'

services:
  al-mcp-server:
    build: .
    volumes:
      - repo-cache:/app/.cache/repo-cache
      - index-cache:/app/.cache/index-cache
    environment:
      - NODE_ENV=production
      - REPO_TYPE=bc-history-sandbox
      - REPO_URL=https://github.com/StefanMaron/MSDyn365BC.Sandbox.Code.History.git
      - DEFAULT_BRANCH=w1-26
      - CLONE_DEPTH=1
      - AUTO_CLEANUP=true
      - CLEANUP_INTERVAL=24h
      - MAX_BRANCHES=10
      - LOG_LEVEL=info
    restart: "no"
    healthcheck:
      test: ["CMD", "pgrep", "-f", "node dist/server.js"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  repo-cache:
    driver: local
  index-cache:
    driver: local